
<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4">Dashboard Produk</h2>

<div class="row">

<div class="col-md-4">
<h4>Tambah Produk</h4>

<input class="form-control mb-2" id="name" placeholder="Nama Produk">
<input class="form-control mb-2" id="price" placeholder="Harga">
<textarea class="form-control mb-2" id="description" placeholder="Deskripsi"></textarea>

<button class="btn btn-primary" onclick="addProduct()">Tambah</button>
</div>

<div class="col-md-8">
<h4>Daftar Produk</h4>

<table class="table table-bordered">
<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="productTable"></tbody>
</table>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
